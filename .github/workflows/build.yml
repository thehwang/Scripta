name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos15:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install Python MLX (for mlx.metallib)
        run: python3 -m pip install mlx --break-system-packages || true

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release
        run: swift build -c release

      - name: Package app
        run: |
          APP="MeetingPilot"
          BIN_PATH="$(swift build -c release --show-bin-path)"
          DIST_DIR="build/dist"
          APP_BUNDLE="$DIST_DIR/$APP.app"

          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          cp "$BIN_PATH/$APP" "$APP_BUNDLE/Contents/MacOS/$APP"
          cp "Sources/MeetingPilot/Info.plist" "$APP_BUNDLE/Contents/Info.plist"
          [ -f "Resources/AppIcon.icns" ] && cp "Resources/AppIcon.icns" "$APP_BUNDLE/Contents/Resources/AppIcon.icns"

          MLX_METALLIB="$(python3 -c 'import mlx; print(mlx.__path__[0])' 2>/dev/null)/lib/mlx.metallib"
          [ -f "$MLX_METALLIB" ] && cp "$MLX_METALLIB" "$APP_BUNDLE/Contents/MacOS/mlx.metallib" && echo "Included mlx.metallib"

          xattr -cr "$APP_BUNDLE"
          /usr/bin/codesign --force --sign - \
            --entitlements MeetingPilot-deploy.entitlements \
            --deep "$APP_BUNDLE"

      - name: Create ZIP
        run: |
          cp scripts/install.sh build/dist/install.sh
          cd build/dist && zip -r ../../MeetingPilot-macos15.zip MeetingPilot.app install.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingPilot-macos15
          path: MeetingPilot-macos15.zip

  build-macos14:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install Python MLX (for mlx.metallib)
        run: python3 -m pip install mlx --break-system-packages || true

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release
        run: swift build -c release

      - name: Package app
        run: |
          APP="MeetingPilot"
          BIN_PATH="$(swift build -c release --show-bin-path)"
          DIST_DIR="build/dist"
          APP_BUNDLE="$DIST_DIR/$APP.app"

          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          cp "$BIN_PATH/$APP" "$APP_BUNDLE/Contents/MacOS/$APP"
          cp "Sources/MeetingPilot/Info.plist" "$APP_BUNDLE/Contents/Info.plist"
          [ -f "Resources/AppIcon.icns" ] && cp "Resources/AppIcon.icns" "$APP_BUNDLE/Contents/Resources/AppIcon.icns"

          MLX_METALLIB="$(python3 -c 'import mlx; print(mlx.__path__[0])' 2>/dev/null)/lib/mlx.metallib"
          [ -f "$MLX_METALLIB" ] && cp "$MLX_METALLIB" "$APP_BUNDLE/Contents/MacOS/mlx.metallib" && echo "Included mlx.metallib"

          xattr -cr "$APP_BUNDLE"
          /usr/bin/codesign --force --sign - \
            --entitlements MeetingPilot-deploy.entitlements \
            --deep "$APP_BUNDLE"

      - name: Create ZIP
        run: |
          cp scripts/install.sh build/dist/install.sh
          cd build/dist && zip -r ../../MeetingPilot-macos14.zip MeetingPilot.app install.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingPilot-macos14
          path: MeetingPilot-macos14.zip

  release:
    needs: [build-macos15, build-macos14]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS 15 artifact
        uses: actions/download-artifact@v4
        with:
          name: MeetingPilot-macos15
          path: artifacts/

      - name: Download macOS 14 artifact (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: MeetingPilot-macos14
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Installation

            | File | macOS Version | Real-time Translation |
            |------|---------------|-----------------------|
            | `MeetingPilot-macos15.zip` | macOS 15+ | Yes (Apple Translation) |
            | `MeetingPilot-macos14.zip` | macOS 14+ | No |

            ### Install (one command):
            ```bash
            unzip MeetingPilot-macos15.zip && bash install.sh
            ```

            The install script handles everything: copy to /Applications, clear quarantine,
            reset permissions, and launch the app. Grant Microphone + Screen Recording when prompted.
