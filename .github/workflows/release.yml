name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Build release binary
        run: swift build -c release

      - name: Package app bundle
        run: |
          BIN_PATH=$(swift build -c release --show-bin-path)
          APP_BUNDLE="MeetingPilot.app"
          CONTENTS_DIR="$APP_BUNDLE/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"

          mkdir -p "$MACOS_DIR"
          cp "$BIN_PATH/MeetingPilot" "$MACOS_DIR/MeetingPilot"
          cp "Sources/MeetingPilot/Info.plist" "$CONTENTS_DIR/Info.plist"

          codesign --force --sign - --entitlements MeetingPilot.entitlements --deep "$APP_BUNDLE"

      - name: Create zip for CI artifact
        run: |
          ditto -c -k --keepParent MeetingPilot.app MeetingPilot.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MeetingPilot.zip
          generate_release_notes: true
          body: |
            ## MeetingPilot ${{ github.ref_name }}

            ### Install from Source (recommended)

            Building from source creates a properly signed app that macOS will trust
            without repeated permission prompts.

            ```bash
            git clone git@github.com:hwang-cadent/MeetingPilot.git
            cd MeetingPilot
            make install
            ```

            This will automatically create a local signing certificate, build, sign,
            and install to `/Applications/`.

            ### Pre-built Binary (advanced)

            The attached `MeetingPilot.zip` is ad-hoc signed and intended for
            CI verification. If you use the pre-built binary, you must remove the
            quarantine attribute after download:

            ```bash
            unzip MeetingPilot.zip
            xattr -cr MeetingPilot.app
            mv MeetingPilot.app /Applications/
            ```

            > **Note**: Ad-hoc signed binaries may trigger repeated macOS permission
            > prompts. Building from source is strongly recommended.

            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - Xcode Command Line Tools (`xcode-select --install`)

            ### Permissions Needed
            On first launch, grant: **Microphone**, **Screen Recording**, **Speech Recognition**
