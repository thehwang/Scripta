name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Build release binary
        run: swift build -c release

      - name: Package app bundle
        run: |
          BIN_PATH=$(swift build -c release --show-bin-path)
          APP_BUNDLE="MeetingPilot.app"
          CONTENTS_DIR="$APP_BUNDLE/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"

          mkdir -p "$MACOS_DIR"
          cp "$BIN_PATH/MeetingPilot" "$MACOS_DIR/MeetingPilot"
          cp "Sources/MeetingPilot/Info.plist" "$CONTENTS_DIR/Info.plist"

          codesign --force --sign - --entitlements MeetingPilot.entitlements --deep "$APP_BUNDLE"

      - name: Create install script and zip
        run: |
          cat > install.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          APP_SRC="$SCRIPT_DIR/MeetingPilot.app"
          APP_DST="/Applications/MeetingPilot.app"

          if [ ! -d "$APP_SRC" ]; then
            echo "Error: MeetingPilot.app not found next to this script."
            exit 1
          fi

          echo "Installing MeetingPilot to /Applications ..."
          [ -d "$APP_DST" ] && rm -rf "$APP_DST"
          cp -R "$APP_SRC" "$APP_DST"

          xattr -cr "$APP_DST"
          codesign --force --deep --sign - "$APP_DST" 2>/dev/null || true

          echo ""
          echo "Done! MeetingPilot installed to /Applications."
          echo ""
          echo "First launch:"
          echo "  1. Open MeetingPilot from /Applications"
          echo "  2. If macOS blocks it: System Settings → Privacy & Security → click 'Open Anyway'"
          echo "  3. Grant permissions when prompted: Microphone, Screen Recording"
          echo ""
          SCRIPT
          chmod +x install.sh

          mkdir -p dist
          cp -R MeetingPilot.app dist/
          cp install.sh dist/
          cd dist && zip -r ../MeetingPilot.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MeetingPilot.zip
          generate_release_notes: true
          body: |
            ## MeetingPilot ${{ github.ref_name }}

            ### Quick Install (recommended)

            ```bash
            # Download and unzip, then:
            cd MeetingPilot   # or wherever you unzipped
            bash install.sh
            ```

            The install script will:
            - Copy `MeetingPilot.app` to `/Applications/`
            - Remove quarantine attributes (prevents repeated auth prompts)
            - Re-sign the app locally

            ### Manual Install

            1. Unzip `MeetingPilot.zip`
            2. Run in Terminal:
               ```bash
               cp -R MeetingPilot.app /Applications/
               xattr -cr /Applications/MeetingPilot.app
               ```
            3. Open from `/Applications/` — if blocked, go to **System Settings → Privacy & Security → Open Anyway**

            ### Permissions Needed
            On first launch, grant access to:
            - **Microphone** (captures your voice)
            - **Screen Recording** (captures system/remote audio via ScreenCaptureKit)
            - **Speech Recognition** (on-device transcription)

            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - Apple Silicon or Intel Mac
