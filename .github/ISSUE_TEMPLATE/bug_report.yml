name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click Start Recording, the app freezes and no transcript appears."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "The app should start capturing audio and showing real-time transcript entries."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Launch Scripta
        2. Click "Start Recording"
        3. Speak into microphone
        4. Observe: no transcript appears, UI is frozen
    validations:
      required: true

  - type: dropdown
    id: macos-version
    attributes:
      label: macOS version
      options:
        - macOS 15 (Sequoia)
        - macOS 14 (Sonoma)
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: chip
    attributes:
      label: Chip
      options:
        - Apple Silicon (M1)
        - Apple Silicon (M2)
        - Apple Silicon (M3)
        - Apple Silicon (M4)
        - Intel
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install Scripta?
      options:
        - Downloaded release ZIP + install.sh
        - Built from source (make run)
        - Manual install
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console logs (optional)
      description: |
        Open Console.app → filter by "Scripta" → paste relevant lines here.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or anything else that might help.
